<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Change Management & AI – Knowledge Map</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=DM+Serif+Display&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #F7F5F0;
    --surface: #FFFFFF;
    --surface2: #F0EDE6;
    --border: rgba(40,36,28,0.12);
    --border-strong: rgba(40,36,28,0.25);
    --text: #1C1A16;
    --text-2: #6B6659;
    --text-3: #9C9384;
    --purple: #6B5CE7;
    --purple-bg: #EEE9FF;
    --teal: #0F8F6B;
    --teal-bg: #E0F5EE;
    --coral: #C94F2C;
    --coral-bg: #FCEEE9;
    --amber: #A86B00;
    --amber-bg: #FFF3D9;
    --blue: #1A6BB5;
    --blue-bg: #E6F1FB;
    --radius: 10px;
    --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 4px 12px rgba(0,0,0,0.04);
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 2rem 1.5rem 4rem;
  }

  header {
    max-width: 960px;
    margin: 0 auto 2.5rem;
    display: flex;
    align-items: baseline;
    gap: 16px;
    flex-wrap: wrap;
  }

  h1 {
    font-family: 'DM Serif Display', serif;
    font-size: 26px;
    font-weight: 400;
    color: var(--text);
    line-height: 1.2;
  }

  .subtitle {
    font-size: 13px;
    color: var(--text-3);
  }

  .legend {
    max-width: 960px;
    margin: 0 auto 2rem;
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
  }

  .leg {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    color: var(--text-2);
  }

  .leg-dot {
    width: 9px; height: 9px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .section-wrap {
    max-width: 960px;
    margin: 0 auto 2rem;
  }

  .section-label {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: .07em;
    text-transform: uppercase;
    color: var(--text-3);
    margin-bottom: 10px;
  }

  .grid { display: grid; gap: 8px; }
  .grid-3 { grid-template-columns: repeat(3, 1fr); }
  .grid-4 { grid-template-columns: repeat(4, 1fr); }
  .grid-2 { grid-template-columns: repeat(2, 1fr); }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 12px 14px;
    cursor: pointer;
    transition: border-color .15s, box-shadow .15s, transform .1s;
    border-left-width: 3px;
    box-shadow: var(--shadow);
  }

  .card:hover {
    border-color: var(--border-strong);
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    transform: translateY(-1px);
  }

  .card.active {
    box-shadow: 0 4px 16px rgba(0,0,0,0.1);
    transform: translateY(-1px);
  }

  .card-title {
    font-size: 13px;
    font-weight: 500;
    color: var(--text);
    margin-bottom: 3px;
    line-height: 1.3;
  }

  .card-sub {
    font-size: 11px;
    color: var(--text-3);
    line-height: 1.4;
    margin-bottom: 6px;
  }

  .card-source {
    font-size: 10px;
    color: var(--text-3);
    border-top: 1px solid var(--border);
    padding-top: 6px;
    margin-top: 4px;
    line-height: 1.4;
  }

  .card-source span {
    display: inline-block;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 1px 6px;
    margin: 2px 2px 0 0;
    white-space: nowrap;
  }

  .card-source-link {
    display: inline-block;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 1px 6px;
    margin: 2px 2px 0 0;
    white-space: nowrap;
    color: var(--text-2);
    text-decoration: none;
    transition: background .12s, border-color .12s, color .12s;
  }

  .card-source-link:hover {
    background: var(--surface);
    border-color: var(--border-strong);
    color: var(--text);
    text-decoration: underline;
  }

  .pill {
    font-size: 11px;
    padding: 4px 10px;
    border-radius: 999px;
    border: 1px solid var(--border-strong);
    color: var(--text-2);
    background: var(--surface2);
    cursor: pointer;
    white-space: nowrap;
    text-decoration: none;
    display: inline-block;
    transition: background .12s, color .12s;
  }

  .pill:hover {
    background: var(--surface);
    color: var(--text);
    text-decoration: underline;
  }

  .stripe-purple { border-left-color: var(--purple); }
  .stripe-teal   { border-left-color: var(--teal); }
  .stripe-coral  { border-left-color: var(--coral); }
  .stripe-amber  { border-left-color: var(--amber); }
  .stripe-blue   { border-left-color: var(--blue); }

  .card.active.stripe-purple { background: var(--purple-bg); border-color: var(--purple); }
  .card.active.stripe-teal   { background: var(--teal-bg);   border-color: var(--teal); }
  .card.active.stripe-coral  { background: var(--coral-bg);  border-color: var(--coral); }
  .card.active.stripe-amber  { background: var(--amber-bg);  border-color: var(--amber); }
  .card.active.stripe-blue   { background: var(--blue-bg);   border-color: var(--blue); }

  .detail {
    max-width: 960px;
    margin: 0 auto;
    background: var(--surface);
    border: 1px solid var(--border-strong);
    border-radius: var(--radius);
    padding: 1.25rem 1.5rem;
    display: none;
    box-shadow: var(--shadow);
    animation: fadeUp .2s ease;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .detail.open { display: block; }

  .detail-title {
    font-family: 'DM Serif Display', serif;
    font-size: 18px;
    font-weight: 400;
    color: var(--text);
    margin-bottom: 8px;
  }

  .detail-body {
    font-size: 13.5px;
    color: var(--text-2);
    line-height: 1.7;
    margin-bottom: 14px;
  }

  .source-label {
    font-size: 11px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: .06em;
    color: var(--text-3);
    margin-bottom: 8px;
  }

  .pills { display: flex; flex-wrap: wrap; gap: 6px; }

  

  @media (max-width: 700px) {
    .grid-3, .grid-4 { grid-template-columns: repeat(2, 1fr); }
    .grid-2 { grid-template-columns: 1fr; }
  }

  @media (max-width: 420px) {
    .grid-3, .grid-4, .grid-2 { grid-template-columns: 1fr; }
  }
</style>
</head>

function buildSection(containerId, items) {
  const el = document.getElementById(containerId);
  items.forEach(n => {
    const card = document.createElement("div");
    card.className = `card ${n.stripe}`;
    card.id = `card-${n.id}`;
    const sourceTags = (n.links || []).map(l =>
      `<a href="${baseURL}${l}" target="_blank" class="card-source-link">${friendlyNames[l] || l}</a>`
    ).join("");
    card.innerHTML = `
      <div class="card-title">${n.title}</div>
      <div class="card-sub">${n.sub}</div>
      <div class="card-source">${sourceTags}</div>`;
    card.addEventListener("click", () => toggle(n));
    el.appendChild(card);
  });
}

function toggle(n) {
  const panel = document.getElementById("detail");
  const prevCard = activeId ? document.getElementById(`card-${activeId}`) : null;
  if (activeId === n.id) {
    panel.classList.remove("open");
    if (prevCard) prevCard.classList.remove("active");
    activeId = null;
    return;
  }
  if (prevCard) prevCard.classList.remove("active");
  const card = document.getElementById(`card-${n.id}`);
  card.classList.add("active");
  activeId = n.id;
  document.getElementById("detail-title").textContent = n.title;
  document.getElementById("detail-body").textContent = n.body;
  const pillsEl = document.getElementById("detail-pills");
  pillsEl.innerHTML = "";
  (n.links || []).forEach(l => {
    const pill = document.createElement("a");
    pill.className = "pill";
    pill.textContent = friendlyNames[l] || l;
    pill.href = baseURL + l;
    pill.target = "_blank";
    pillsEl.appendChild(pill);
  });
  panel.classList.add("open");
  setTimeout(() => panel.scrollIntoView({ behavior: "smooth", block: "nearest" }), 60);
}

buildSection("frameworks", nodes.frameworks);
buildSection("ai-adoption", nodes["ai-adoption"]);
buildSection("people", nodes.people);
buildSection("measurement", nodes.measurement);
buildSection("roles", nodes.roles);
</script>
